const Badge = ({ type, data }) => {
  const d = type === "dept" ? DEPARTMENTS[data] : CHANNELS[data];
  if (!d) return null;
  return React.createElement("span", {
    style: { fontSize: 10, padding: "2px 8px", borderRadius: 20, background: d.bg,
      color: type === "dept" ? d.color : d.textColor, fontWeight: 500, whiteSpace: "nowrap" }
  }, type === "dept" ? d.icon + " " + d.label : d.label);
};

function renderMedia(m) {
  var elements = [];

  if (m.story_url) {
    elements.push(
      React.createElement("div", { key: "story", style: { marginBottom: 6, padding: 6, background: "#f0e6f6", borderRadius: 8, border: "1px solid #d9c4e8" } },
        React.createElement("div", { style: { fontSize: 10, color: "#8854D0", fontWeight: 600, marginBottom: 4 } }, "Respuesta a tu historia"),
        React.createElement("img", { src: m.story_url, style: { maxWidth: "100%", maxHeight: 150, borderRadius: 6, display: "block" }, onError: function(e) { e.target.style.display = "none"; } })
      )
    );
  }

  if (m.media_type === "image" && m.media_url) {
    elements.push(
      React.createElement("img", { key: "img", src: m.media_url, style: { maxWidth: "100%", maxHeight: 250, borderRadius: 8, display: "block", marginBottom: m.content && m.content !== "[Imagen]" ? 6 : 0, cursor: "pointer" }, onClick: function() { window.open(m.media_url, "_blank"); }, onError: function(e) { e.target.alt = "Imagen no disponible"; e.target.style.padding = "20px"; e.target.style.background = "#f5f5f5"; } })
    );
  }

  if (m.media_type === "video" && m.media_url) {
    elements.push(
      React.createElement("video", { key: "vid", src: m.media_url, controls: true, style: { maxWidth: "100%", maxHeight: 250, borderRadius: 8, display: "block", marginBottom: m.content && m.content !== "[Video]" ? 6 : 0 } })
    );
  }

  if (m.media_type === "audio" && m.media_url) {
    elements.push(
      React.createElement("audio", { key: "aud", src: m.media_url, controls: true, style: { width: "100%", marginBottom: m.content && m.content !== "[Audio]" ? 6 : 0 } })
    );
  }

  if (m.content && m.content !== "[Imagen]" && m.content !== "[Video]" && m.content !== "[Audio]" && m.content !== "[Archivo]") {
    elements.push(
      React.createElement("span", { key: "txt" }, m.content)
    );
  } else if (m.media_type === "file" && m.media_url) {
    elements.push(
      React.createElement("a", { key: "file", href: m.media_url, target: "_blank", style: { color: "#185FA5", textDecoration: "underline", fontSize: 12 } }, "Descargar archivo")
    );
  } else if (!m.media_type && m.content) {
    elements.push(
      React.createElement("span", { key: "txt" }, m.content)
    );
  }

  return elements;
}
