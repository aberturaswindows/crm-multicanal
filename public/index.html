<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexoCRM - CRM Multicanal con IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #EEEEE9; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

  @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.origin + "/api";

const DEPARTMENTS = {
  ventas: { label: "Ventas", color: "#E87B35", bg: "#FDF2E9", icon: "\u{1F4B0}" },
  soporte: { label: "Soporte", color: "#2E86DE", bg: "#E8F4FD", icon: "\u{1F527}" },
  admin: { label: "Admin", color: "#8854D0", bg: "#F3EEFB", icon: "\u{1F4CB}" },
  reclamos: { label: "Reclamos", color: "#EB3B5A", bg: "#FDEBEF", icon: "\u26A0\uFE0F" },
};

const CHANNELS = {
  whatsapp: { label: "WhatsApp", color: "#25D366", bg: "#E7F9EE", icon: "WA", textColor: "#1A7F3F" },
  instagram: { label: "Instagram", color: "#E4405F", bg: "#FCE9ED", icon: "IG", textColor: "#A12D43" },
  facebook: { label: "Facebook", color: "#1877F2", bg: "#E6F0FE", icon: "FB", textColor: "#1260C4" },
  email: { label: "Email", color: "#5F6368", bg: "#F0F0F2", icon: "\u2709", textColor: "#3C3F43" },
  telefono: { label: "Tel\u00E9fono", color: "#FF9500", bg: "#FFF4E5", icon: "\u{1F4DE}", textColor: "#A66200" },
};

const Badge = ({ type, data }) => {
  const d = type === "dept" ? DEPARTMENTS[data] : CHANNELS[data];
  if (!d) return null;
  return React.createElement("span", {
    style: { fontSize: 10, padding: "2px 8px", borderRadius: 20, background: d.bg,
      color: type === "dept" ? d.color : d.textColor, fontWeight: 500, whiteSpace: "nowrap" }
  }, type === "dept" ? `${d.icon} ${d.label}` : d.label);
};

function App() {
  const [contacts, setContacts] = useState([]);
  const [selected, setSelected] = useState(null);
  const [messages, setMessages] = useState([]);
  const [filterCh, setFilterCh] = useState("all");
  const [filterDept, setFilterDept] = useState("all");
  const [tab, setTab] = useState("info");
  const [msgText, setMsgText] = useState("");
  const [suggestion, setSuggestion] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [view, setView] = useState("inbox");
  const [agents, setAgents] = useState([]);
  const [phoneLines, setPhoneLines] = useState([]);
  const [metrics, setMetrics] = useState(null);
  const [routingLog, setRoutingLog] = useState([]);

  const pollRef = useRef(null);

  // Cargar datos iniciales
  useEffect(() => {
    loadContacts();
    fetch(API + "/agents").then(r => r.json()).then(setAgents).catch(() => {});
    fetch(API + "/phone-lines").then(r => r.json()).then(setPhoneLines).catch(() => {});
    // Polling cada 5 segundos para nuevos mensajes
    pollRef.current = setInterval(loadContacts, 5000);
    return () => clearInterval(pollRef.current);
  }, []);

  const loadContacts = () => {
    let url = API + "/contacts?";
    if (filterCh !== "all") url += `channel=${filterCh}&`;
    if (filterDept !== "all") url += `department=${filterDept}&`;
    fetch(url).then(r => r.json()).then(setContacts).catch(() => {});
  };

  useEffect(() => { loadContacts(); }, [filterCh, filterDept]);

  useEffect(() => {
    if (selected) {
      fetch(API + `/contacts/${selected.id}/messages`).then(r => r.json()).then(msgs => {
        setMessages(msgs);
        setTimeout(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, 100);
      }).catch(() => {});
      loadSuggestion(selected.id);
    }
  }, [selected?.id]);

  useEffect(() => {
    if (view === "routing") {
      fetch(API + "/routing-log").then(r => r.json()).then(setRoutingLog).catch(() => {});
    }
    if (view === "metrics") {
      fetch(API + "/metrics").then(r => r.json()).then(setMetrics).catch(() => {});
    }

  const loadSuggestion = async (contactId) => {
    setAiLoading(true);
    setSuggestion("");
    try {
      const res = await fetch(API + `/contacts/${contactId}/suggestion`);
      const data = await res.json();
      setSuggestion(data.suggestion || "");
    } catch { setSuggestion("Error de conexi\u00F3n."); }
    setAiLoading(false);
  };

  const sendMsg = async () => {
    if (!msgText.trim() || !selected) return;
    try {
      await fetch(API + `/contacts/${selected.id}/messages`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: msgText.trim() })
      });
      setMsgText("");
      const msgs = await fetch(API + `/contacts/${selected.id}/messages`).then(r => r.json());
      setMessages(msgs);
      loadContacts();
      setTimeout(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, 100);
      loadSuggestion(selected.id);
    } catch (err) { console.error(err); }
  };

  const updateContact = async (id, updates) => {
    try {
      const res = await fetch(API + `/contacts/${id}`, {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updates)
      });
      const updated = await res.json();
      setSelected(updated);
      loadContacts();
      setShowReassign(false);
    } catch (err) { console.error(err); }

    setSelected(c);
    setShowReassign(false);
    setTab("info");

              React.createElement("button", { onClick: () => setFilterCh("all"), style: { fontSize: 11, padding: "3px 10px", borderRadius: 20, cursor: "pointer", border: filterCh === "all" ? "1px solid #999" : "1px solid #ddd", background: filterCh === "all" ? "#f0f0ee" : "#fff", color: filterCh === "all" ? "#111" : "#888" } }, "Todos"),
              Object.entries(CHANNELS).map(([k, v]) =>
                React.createElement("button", { key: k, onClick: () => setFilterCh(k), style: { fontSize: 11, padding: "3px 10px", borderRadius: 20, cursor: "pointer", border: filterCh === k ? `1px solid ${v.color}` : "1px solid #ddd", background: filterCh === k ? v.bg : "#fff", color: filterCh === k ? v.textColor : "#888" } }, v.icon)
              )
            ),
            React.createElement("div", { style: { fontSize: 11, fontWeight: 600, color: "#999", letterSpacing: "0.05em", marginBottom: 6 } }, "\u00C1REAS"),
            React.createElement("div", { style: { display: "flex", gap: 4, flexWrap: "wrap" } },
              React.createElement("button", { onClick: () => setFilterDept("all"), style: { fontSize: 11, padding: "3px 10px", borderRadius: 20, cursor: "pointer", border: filterDept === "all" ? "1px solid #999" : "1px solid #ddd", background: filterDept === "all" ? "#f0f0ee" : "#fff", color: filterDept === "all" ? "#111" : "#888" } }, "Todos"),
              Object.entries(DEPARTMENTS).map(([k, d]) =>

                    (c.name || "?").split(" ").map(w => w[0]).join("").substring(0, 2).toUpperCase(),

                    React.createElement("div", { style: { display: "flex", justifyContent: "space-between" } },

                      React.createElement("span", { style: { fontSize: 10, color: "#bbb", flexShrink: 0 } }, formatTime(c.last_message_at))
                    ),
                    React.createElement("div", { style: { fontSize: 11, color: "#999", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginTop: 2 } }, c.last_message || "Sin mensajes")
                  ),
                  c.unread > 0 && React.createElement("div", { style: { background: "#EB3B5A", color: "#fff", fontSize: 10, fontWeight: 600, padding: "1px 6px", borderRadius: 10, flexShrink: 0 } }, c.unread)

                React.createElement("div", { style: { display: "flex", gap: 4, marginTop: 6 } },
                  React.createElement(Badge, { type: "dept", data: c.department }),
                  React.createElement(Badge, { type: "ch", data: c.channel })

            }),
            contacts.length === 0 && React.createElement("div", { style: { padding: 20, textAlign: "center", color: "#bbb", fontSize: 13 } }, "No hay contactos")

        React.createElement("div", { style: { display: "flex", flexDirection: "column", overflow: "hidden", background: "#fafaf8" } },
          selected ?
            React.createElement(React.Fragment, null,
              // Chat header
              React.createElement("div", { style: { padding: "12px 16px", borderBottom: "1px solid #e2e2e0", background: "#fff", display: "flex", alignItems: "center", justifyContent: "space-between" } },
                React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
                  React.createElement("div", { style: { width: 36, height: 36, borderRadius: "50%", background: ch?.bg || "#eee", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 600, color: "#555" } }, (selected.name || "?").split(" ").map(w => w[0]).join("").substring(0, 2).toUpperCase()),
                  React.createElement("div", null,
                    React.createElement("div", { style: { fontSize: 14, fontWeight: 600, color: "#111" } }, selected.name),
                    React.createElement("div", { style: { display: "flex", gap: 4, marginTop: 2 } },
                      React.createElement(Badge, { type: "ch", data: selected.channel }),
                      React.createElement(Badge, { type: "dept", data: selected.department })
                    )
                  )
                )
              ),
              // AI routing banner
              React.createElement("div", { style: { margin: "8px 16px", padding: "10px 14px", background: "#fff", border: "1px solid #e2e2e0", borderRadius: 10, fontSize: 12 } },
                React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 6, marginBottom: 6 } },
                  React.createElement("div", { style: { width: 7, height: 7, borderRadius: "50%", background: "#25D366", animation: "pulse 2s infinite" } }),
                  React.createElement("span", { style: { fontSize: 11, fontWeight: 600, color: "#555" } }, "ROUTING IA")
                ),
                React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" } },
                  React.createElement("span", { style: { color: "#333" } }, "Derivado a"),
                  dept && React.createElement("span", { style: { background: dept.bg, color: dept.color, padding: "3px 10px", borderRadius: 20, fontWeight: 600, fontSize: 11 } }, `${dept.icon} ${dept.label}`),
                  React.createElement("span", { style: { fontSize: 11, color: "#999" } }, `Confianza: ${selected.ai_confidence || "pending"}`)
                ),
                React.createElement("div", { style: { display: "flex", gap: 6, marginTop: 8 } },
                  React.createElement("button", { onClick: () => setShowReassign(!showReassign), style: { padding: "5px 12px", fontSize: 11, borderRadius: 6, border: "1px solid #ddd", background: "#f5f5f3", color: "#666", cursor: "pointer" } }, "\u21BB Reasignar")
                ),

                  Object.entries(DEPARTMENTS).map(([k, d]) =>
                    React.createElement("button", { key: k, onClick: () => updateContact(selected.id, { department: k, _old_department: selected.department }), style: { padding: "5px 12px", fontSize: 11, borderRadius: 20, border: selected.department === k ? `1px solid ${d.color}` : "1px solid #ddd", background: selected.department === k ? d.bg : "#fff", color: selected.department === k ? d.color : "#888", cursor: "pointer", fontWeight: selected.department === k ? 600 : 400 } }, `${d.icon} ${d.label}`)
                  )
                )
              ),
              // Messages

                    React.createElement("div", { style: { padding: "9px 14px", borderRadius: m.direction === "outgoing" ? "14px 4px 14px 14px" : "4px 14px 14px 14px", background: m.direction === "outgoing" ? "#E6F1FB" : "#fff", color: m.direction === "outgoing" ? "#042C53" : "#111", fontSize: 13, lineHeight: 1.55, border: m.direction === "incoming" ? "1px solid #e8e8e6" : "none" } }, m.content),
                    React.createElement("div", { style: { fontSize: 10, color: "#bbb", padding: "2px 4px", textAlign: m.direction === "outgoing" ? "right" : "left" } }, formatTime(m.created_at))
                  )
                )
              ),
              // Input area
              React.createElement("div", { style: { padding: "10px 16px", borderTop: "1px solid #e2e2e0", background: "#fff" } },
                (suggestion || aiLoading) && React.createElement("div", { style: { marginBottom: 8, padding: "8px 12px", background: "#f9f9f7", border: "1px solid #e5e5e3", borderRadius: 8, fontSize: 12, display: "flex", gap: 8, alignItems: "flex-start" } },
                  React.createElement("div", { style: { width: 6, height: 6, borderRadius: "50%", background: aiLoading ? "#999" : "#25D366", marginTop: 5, flexShrink: 0, animation: aiLoading ? "dotPulse 1s infinite" : "none" } }),
                  React.createElement("div", { style: { flex: 1, color: aiLoading ? "#999" : "#444" } }, aiLoading ? "Generando sugerencia..." : suggestion),
                  !aiLoading && suggestion && React.createElement("button", { onClick: () => setMsgText(suggestion), style: { fontSize: 10, padding: "3px 8px", borderRadius: 6, border: "1px solid #B5D4F4", background: "#E6F1FB", color: "#185FA5", cursor: "pointer", flexShrink: 0, fontWeight: 500 } }, "Usar"),
                  !aiLoading && React.createElement("button", { onClick: () => loadSuggestion(selected.id), style: { fontSize: 10, padding: "3px 8px", borderRadius: 6, border: "1px solid #ddd", background: "#f5f5f3", color: "#888", cursor: "pointer", flexShrink: 0 } }, "\u21BB")

                React.createElement("div", { style: { display: "flex", gap: 8, alignItems: "flex-end" } },

                  React.createElement("button", { onClick: sendMsg, style: { background: "#185FA5", color: "#fff", border: "none", borderRadius: 10, padding: "9px 18px", fontSize: 12, fontWeight: 600, cursor: "pointer", flexShrink: 0 } }, "Enviar")

                t === "info" ? "Cliente" : "Equipo"
